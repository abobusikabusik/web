<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .bg-purple { background-color: #6f42c1; color: white; }
    .text-purple { color: #6f42c1; }
    .btn-purple { background-color: #6f42c1; color: white; border: none; }
    .btn-purple:hover { background-color: #5a32a3; color: white; }
    .btn-edit { background-color: #9575cd; color: white; border: none;
    .btn-edit:hover { background-color: #7e57c2; color: white; }
    .btn-delete { background-color: #4527a0; color: white; border: none; }
    .btn-delete:hover { background-color: #311b92; color: white; }
  </style>
</head>
<body class="container mt-5" style="background-color: #f4f0fa;">
<div th:replace="${content}"></div>
</body>
</html>
